<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">My Rental History</h2>
    <button (click)="clearMyHistory()" class="btn btn-sm btn-outline-secondary">
      🔄 Reset My History
    </button>
  </div>

  <div *ngIf="isLoading" class="text-center">
    <div class="spinner-border text-primary" role="status"></div>
    <p>Loading your trips...</p>
  </div>

  <div *ngIf="!isLoading && bookings.length > 0" class="row">
    <div class="col-md-12 mb-3" *ngFor="let b of bookings">
      <div class="card shadow-sm">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <h5 class="card-title">{{ b.car?.brand }} {{ b.car?.model }}</h5>
            <p class="text-muted mb-1">
              🗓️ {{ b.startDate | date }} to {{ b.endDate | date }}
            </p>
            <p class="small text-secondary mb-2" *ngIf="b.car?.year">
              Year: {{ b.car.year }} | Category: {{ b.car.category }}
            </p>
            <span class="badge" [ngClass]="{
    'bg-success': b.status?.toLowerCase() === 'confirmed',
    'bg-warning': b.status?.toLowerCase() === 'pending',
    'bg-danger': b.status?.toLowerCase() === 'cancelled'
  }">
              {{ b.status | uppercase }}
            </span>
          </div>
          <div class="text-end">
            <h4 class="text-primary">${{ b.totalCost }}</h4>
            <button (click)="downloadInvoice(b)" class="btn btn-outline-primary btn-sm me-2">
              📄 Download Invoice
            </button>
            <button *ngIf="b.status !== 'cancelled'" (click)="cancelBooking(b.id)"
              class="btn btn-outline-danger btn-sm">
              Cancel Trip
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!isLoading && bookings.length === 0" class="alert alert-info">
    You haven't booked any vehicles yet. <a routerLink="/vehicles">Browse cars here.</a>
  </div>
</div>
