<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <h1 class="register-title">Create Account</h1>
      <p class="register-subtitle">Start your journey with us today</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="register-form">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name *</label>
          <input
            type="text"
            id="firstName"
            [(ngModel)]="formData.firstName"
            name="firstName"
            required
            placeholder="John"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="lastName">Last Name *</label>
          <input
            type="text"
            id="lastName"
            [(ngModel)]="formData.lastName"
            name="lastName"
            required
            placeholder="Doe"
            class="form-input"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address *</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="formData.email"
          name="email"
          required
          placeholder="john.doe@example.com"
          class="form-input"
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Password *</label>
          <input
            type="password"
            id="password"
            [(ngModel)]="formData.password"
            name="password"
            required
            (input)="checkPasswords()"
            placeholder="••••••••"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password *</label>
          <input
            type="password"
            id="confirmPassword"
            [(ngModel)]="formData.confirmPassword"
            name="confirmPassword"
            required
            (input)="checkPasswords()"
            placeholder="••••••••"
            class="form-input"
            [class.error]="!passwordsMatch && formData.confirmPassword"
          />
          <span *ngIf="!passwordsMatch && formData.confirmPassword" class="field-error">
            Passwords do not match
          </span>
        </div>
      </div>

      <div class="form-group">
        <label for="phoneNumber">Phone Number</label>
        <input
          type="tel"
          id="phoneNumber"
          [(ngModel)]="formData.phoneNumber"
          name="phoneNumber"
          placeholder="+94702188990"
          class="form-input"
        />
      </div>

      <div class="form-group">
        <label for="address">Address</label>
        <input
          type="text"
          id="address"
          [(ngModel)]="formData.address"
          name="address"
          placeholder="123 Main Street, City"
          class="form-input"
        />
      </div>

      <!-- <div class="form-group">
        <label for="driverLicense">Driver License Number</label>
        <input
          type="text"
          id="driverLicense"
          [(ngModel)]="formData.driverLicenseNumber"
          name="driverLicense"
          placeholder="DL123456789"
          class="form-input"
        />
      </div> -->

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button type="submit" class="submit-btn" [disabled]="isLoading || !passwordsMatch">
        <span *ngIf="!isLoading">Create Account</span>
        <span *ngIf="isLoading">Creating Account...</span>
      </button>
    </form>

    <div class="register-footer">
      <p>Already have an account? <a routerLink="/login" class="login-link">Sign In</a></p>
    </div>
  </div>
</div>
