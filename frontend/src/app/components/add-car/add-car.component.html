<div class="navigation-buttons">
  <a routerLink="/vehicles" class="nav-card back">
    <div class="nav-icon">←</div>
    <h5>Back to List</h5>
    <p>View all vehicles</p>
  </a>
</div>
<div class="form-container">
  <div class="form-card">
    <h2>List Your Vehicle</h2>
    <form (ngSubmit)="onSubmit()" #carForm="ngForm">
      <div class="input-grid">
        <!-- Brand -->
        <div class="form-group">
          <label>Brand *</label>
          <select [(ngModel)]="car.brand" name="brand" required>
            <option value="" disabled selected>Choose a brand</option>
            <option value="Toyota">Toyota</option>
            <option value="BMW">BMW</option>
            <option value="Honda">Honda</option>
            <option value="Tesla">Tesla</option>
            <option value="Ford">Ford</option>
            <option value="Mercedes">Mercedes</option>
            <option value="Rolls-Royce">Rolls-Royce</option>
            <option value="Hyundai">Hyundai</option>
            <option value="Nissan">Nissan</option>
          </select>
        </div>

        <!-- Model -->
        <div class="form-group">
          <label>Model *</label>
          <input type="text" [(ngModel)]="car.model" name="model" required placeholder="e.g., Camry" />
        </div>

        <!-- Year -->
        <div class="form-group">
          <label>Year *</label>
          <input type="number" [(ngModel)]="car.year" name="year" required min="2000" max="2026" value="2024" />
        </div>

        <!-- License Plate -->
        <div class="form-group">
          <label>License Plate *</label>
          <input type="text" [(ngModel)]="car.licensePlate" name="licensePlate" required placeholder="e.g., ABC123" />
        </div>

        <!-- Category -->
        <div class="form-group">
          <label>Category *</label>
          <select [(ngModel)]="car.category" name="category" required>
            <option value="SEDAN">Sedan</option>
            <option value="SUV">SUV</option>
            <option value="HATCHBACK">Hatchback</option>
            <option value="LUXURY">Luxury</option>
            <option value="SPORTS">Sports</option>
            <option value="VAN">Van</option>
          </select>
        </div>

        <!-- Transmission -->
        <div class="form-group">
          <label>Transmission *</label>
          <select [(ngModel)]="car.transmission" name="transmission" required>
            <option value="AUTOMATIC">Automatic</option>
            <option value="MANUAL">Manual</option>
          </select>
        </div>

        <!-- Fuel Type -->
        <div class="form-group">
          <label>Fuel Type *</label>
          <select [(ngModel)]="car.fuelType" name="fuelType" required>
            <option value="GASOLINE">Gasoline</option>
            <option value="DIESEL">Diesel</option>
            <option value="ELECTRIC">Electric</option>
            <option value="HYBRID">Hybrid</option>
          </select>
        </div>

        <!-- Seats -->
        <div class="form-group">
          <label>Seats *</label>
          <input type="number" [(ngModel)]="car.seats" name="seats" required min="1" max="10" value="5" />
        </div>

        <!-- Daily Rate -->
        <div class="form-group">
          <label>Daily Rate ($) *</label>
          <input type="number" [(ngModel)]="car.dailyRate" name="dailyRate" required min="1" step="0.01"
            value="50.00" />
        </div>
      </div>

      <!-- Optional fields -->
      <div class="input-grid">
        <div class="form-group">
          <label>Color</label>
          <input type="text" [(ngModel)]="car.color" name="color" placeholder="e.g., Red" />
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" [(ngModel)]="car.location" name="location" placeholder="e.g., New York" />
        </div>

        <div class="form-group">
          <label>Mileage</label>
          <input type="number" [(ngModel)]="car.mileage" name="mileage" min="0" value="0" />
        </div>

        <div class="form-group">
          <label>Image URL</label>
          <input type="text" [(ngModel)]="car.imageUrl" name="imageUrl" placeholder="https://example.com/car.jpg" />
        </div>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label>Description</label>
        <textarea [(ngModel)]="car.description" name="description" rows="3"
          placeholder="Describe the car..."></textarea>
      </div>

      <!-- Image Preview -->
      <div class="image-preview-container" *ngIf="car.imageUrl">
        <p>Photo Preview:</p>
        <img [src]="car.imageUrl" alt="Preview" onerror="this.src = 'assets/bmw.jpg'" />
      </div>

      <button type="submit" class="btn-primary form-submit" [disabled]="!carForm.valid">
        {{
        carForm.valid ? "List Car Now" : "Please fill all required fields (*)"
        }}
      </button>

      <!-- Test Button -->
      <button type="button" (click)="fillTestData()" class="btn-secondary" style="margin-top: 10px; margin-left: 10px">
        Fill Test Data
      </button>
    </form>
  </div>
</div>
