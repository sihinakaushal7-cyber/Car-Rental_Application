<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
</head>

<body>
  <!-- Navigation Bar - Only show when not on login/register -->
  <nav *ngIf="shouldShowNavigation()" class="navbar">
    <div class="nav-container">
      <!-- LEFT SIDE: Logo + Add Vehicle Button -->
      <div class="nav-left">
        <div class="nav-brand" (click)="navigateTo('/vehicles')">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path
              d="M5 17h-.8c-.3 0-.6-.2-.7-.5L1 9.7c-.1-.2 0-.4 0-.6C1.2 8.4 1.7 8 2.2 8h15.6c.5 0 1 .4 1.2 1.1.1.2.1.4 0 .6l-2.5 6.8c-.1.3-.4.5-.7.5H15M5 17v-5M5 17h10v-5" />
            <circle cx="7" cy="20" r="2" />
            <circle cx="15" cy="20" r="2" />
          </svg>
          <span class="brand-text">DriveNow</span>
        </div>

        <!-- ADD VEHICLE BUTTON (LEFT SIDE, NEXT TO LOGO) -->
        <button *ngIf="isAdmin" routerLink="/add-car" class="add-vehicle-btn">
          ＋ Add Your Vehicle
        </button>
      </div>

      <!-- CENTER: Navigation Links -->
      <div class="nav-links">
        <a class="nav-link" (click)="navigateTo('/vehicles')">Browse Cars</a>
        <a class="nav-link" *ngIf="isAuthenticated" (click)="navigateTo('/bookings')">My Bookings</a>
        <a class="nav-link" *ngIf="isAdmin" (click)="navigateTo('/admin')">Dashboard</a>
      </div>

      <!-- RIGHT SIDE: Auth Buttons -->
      <div class="nav-actions">
        <div *ngIf="!isAuthenticated">
          <button class="btn-secondary" (click)="navigateTo('/login')">
            Sign In
          </button>
          <button class="btn-primary" (click)="navigateTo('/register')">
            Get Started
          </button>
        </div>
        <div *ngIf="isAuthenticated" class="user-menu">
          <span class="user-name">{{
            currentUser?.firstName || "User"
            }}</span>
          <span class="user-role">{{
            currentUser?.role === "ROLE_ADMIN" ? "(Admin)" : ""
            }}</span>
          <button class="btn-secondary" (click)="logout()">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <!-- Footer - Only show when not on login/register -->
  <footer *ngIf="shouldShowNavigation()" class="footer">
    <div class="footer-content">
      <div class="footer-section">
        <h4>DriveNow</h4>
        <p>Your trusted car rental partner</p>
      </div>
      <div class="footer-section">
        <h4>Quick Links</h4>
        <a href="#">About Us</a>
        <a href="#">Contact</a>
        <a href="#">Terms</a>
      </div>
      <div class="footer-section">
        <h4>Support</h4>
        <a href="#">Help Center</a>
        <a href="#">FAQ</a>
        <a href="#">Privacy</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2025 DriveNow. All rights reserved.</p>
    </div>
  </footer>
</body>

</html>
